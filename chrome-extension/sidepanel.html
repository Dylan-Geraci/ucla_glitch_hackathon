<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Browsing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Setup Overlay (Glass Card) -->
  <div id="setup-overlay">
    <div class="setup-card">
      <div class="glitch-logo">GEORGE_HUB</div>
      <p>Activate your AI browsing companion.</p>
      <div class="input-group">
        <input type="password" id="api-key-input" placeholder="Enter Gemini API Key..." autocomplete="off" />
        <button id="connect-btn">INITIALIZE</button>
      </div>
      <div class="error" id="setup-error"></div>
    </div>
  </div>

  <div id="screenshot-flash"></div>

  <!-- Main App Container -->
  <div id="main-panel" class="app-container">
    
    <!-- Top Toolbar (Control Center) -->
    <header class="control-center">
      <div class="control-row">
        <div class="status-group">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label">GEORGE_LIVE</span>
        </div>
        
        <div class="toolbar-actions">
          <button id="key-btn" title="Reset API Key">⚙️</button>
          <label class="toggle-switch agent-toggle">
            <input type="checkbox" id="agent-toggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="sliders-group">
        <div class="slider-item">
          <span class="sl-label">PROACTIVE</span>
          <input type="range" id="freq-slider" min="0" max="1" step="0.01" value="0.1" />
        </div>
        <div class="slider-item">
          <span class="sl-label">MUSIC_VOL</span>
          <div class="music-controls">
            <input type="checkbox" id="music-toggle" />
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.25" />
          </div>
        </div>
      </div>
    </header>

    <!-- The Console (Unified History + Input) -->
    <main class="console-box">
      <div id="history-container">
        <div class="welcome-msg">--- AGENT INITIALIZED ---</div>
      </div>

      <div class="input-dock">
        <div class="dock-main">
          <button id="mic-btn" class="mic-icon" title="Voice Input">🎙</button>
          <input type="text" id="text-input" placeholder="Ask GEORGE anything..." autocomplete="off" />
          <button id="send-btn" class="send-icon">↵</button>
        </div>
        <div class="dock-info">
          <span id="music-status">BPM: IDLE</span>
          <span id="agent-thinking" class="hidden">THINKING...</span>
        </div>
      </div>
    </main>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
