<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browsing Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Setup Overlay -->
  <div id="setup-overlay">
    <div class="setup-card">
      <h2>Browsing Agent</h2>
      <p>Enter your Google Gemini API key to activate your AI browsing companion. Your key is stored locally.</p>
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
      <button id="connect-btn">Connect Agent</button>
      <div class="error" id="setup-error"></div>
    </div>
  </div>

  <!-- Screenshot flash overlay -->
  <div id="screenshot-flash"></div>

  <!-- Main Panel (shown after connect) -->
  <div id="main-panel">
    <!-- Agent Controls -->
    <div class="controls-section">
      <div class="control-row">
        <div class="status-dot" id="status-dot"></div>
        <label class="toggle-label">Agent</label>
        <label class="toggle-switch">
          <input type="checkbox" id="agent-toggle" />
          <span class="slider"></span>
        </label>
        <button id="key-btn">Change Key</button>
      </div>

      <div class="control-row">
        <span class="freq-label">Quiet</span>
        <input type="range" id="freq-slider" min="0" max="1" step="0.01" value="0.1" />
        <span class="freq-label">Chatty</span>
      </div>

      <div class="control-row">
        <label class="toggle-label">Music</label>
        <label class="toggle-switch">
          <input type="checkbox" id="music-toggle" />
          <span class="slider"></span>
        </label>
        <span id="music-status" class="freq-label">Off</span>
      </div>
    </div>

    <!-- Mic Button -->
    <button id="mic-btn" title="Hold to speak">🎙</button>

    <!-- Commentary -->
    <div id="commentary" class="idle">Agent standing by...</div>

    <!-- Text Input -->
    <div class="text-input-row">
      <input type="text" id="text-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
